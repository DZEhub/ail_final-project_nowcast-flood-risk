# This is the name of the GitHub Actions workflow.
name: CI - Test and Train Pipeline

# This section defines the triggers for the workflow.
on:
  # Run the workflow on pushes to the 'main' branch.
  push:
    branches: [ main ]
  # Run the workflow on pull requests targeting the 'main' branch.
  pull_request:
    branches: [ main ]

# This defines the jobs that will run as part of the workflow.
jobs:
  # The 'build-and-test' job is responsible for testing the code.
  unit-tests:
    # This specifies the runner environment; 'ubuntu-latest' is a standard choice.
    runs-on: ubuntu-latest

    # These are the sequential steps that the job will execute.
    steps:
    # Step 1: Check out the repository code.
    # This action downloads your code into the runner environment.
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up the Python environment.
    # This action installs a specific version of Python.
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Specify the Python version your project uses.
        cache: 'pip'

    # Step 3: Install project dependencies.
    # This step uses pip to install packages listed in requirements.txt.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt # Assuming you have a requirements.txt file.
        pip install pytest # Install pytest for running tests.

    # Step 4: Run the unit tests with pytest.
    # This command executes the tests located in the '07_pyTests/tests' directory.
    - name: Run Pytest
      run: pytest -v tests/

  # Step 5: Run the main training pipeline (Integration Test).
  # This is an optional step to ensure the full pipeline runs.
  # It uses default arguments; you can customize this command as needed.
  build-pipeline:
    needs: unit-tests
    if: success() # Only run this job if the unit tests pass.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Training Pipeline
        # run: python run_pipeline.py --train --test --forecast --log-artifacts
        run: python run_pipeline.py
        env:
          # --- MLflow (serveur de tracking hébergé sur Hugging Face) ---
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          # --- Stockage des artefacts MLflow sur S3 ---
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          # --- Back-end storage: Neon db ---
          # NEON_HOST: ${{ secrets.NEON_HOST }}
          # NEON_USER: ${{ secrets.NEON_USER }}
          # NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
          # NEON_DATABASE: ${{ secrets.NEON_DATABASE }}
          # NEON_PORT: ${{ secrets.NEON_PORT }}
          BACKEND_STORE_URI: ${{ secrets.BACKEND_STORE_URI }}
          # --- Hyperparamètres : valeur saisie en manuel, sinon défaut sur push/PR ---
          # N_ESTIMATORS: ${{ github.event.inputs.n_estimators || '150' }}
          # MIN_SAMPLES_SPLIT: ${{ github.event.inputs.min_samples_split || '8' }}
          # REGISTER_ALIAS: ${{ github.event.inputs.register_alias || 'challenger' }}
